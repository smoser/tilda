unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-option -g default-command "/bin/bash"
set-option -g history-limit 8192

set  -g status-style bg=green,fg=black
setw -g window-status-current-style bg=cyan

set-hook -g after-new-session {
  if-shell '[ "#{session_name}" = "browser-share" ]' {
    set  -g status-style bg=blue,fg=black
    setw -g window-status-current-style bg=lightblue
  }
}

# claude wrote these to try to help with /terminal-setup - does not seem to work
# Enable extended keys for better key combination support
set -s extended-keys on
set -as terminal-features 'xterm-kitty:extkeys'

# Enable focus events (helpful for various applications)
set -g focus-events on

# Allow applications to set the clipboard
set -g set-clipboard on
